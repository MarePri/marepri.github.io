<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Marko Prihoško</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" type="image/png" href="./vwoj1l96lsj41.png">
</head>

<body>

    <section class="wrapper">
        <div class="container">
            <div id="scene" class="scene" data-hover-only="false">
                <div class="circle" data-depth="1.2"></div>
                <div class="one" data-depth="0.9">
                    <div class="content">
                        <span class="piece"></span>
                        <span class="piece"></span>
                        <span class="piece"></span>
                    </div>
                </div>
                <div class="two" data-depth="0.60">
                    <div class="content">
                        <span class="piece"></span>
                        <span class="piece"></span>
                        <span class="piece"></span>
                    </div>
                </div>
                <div class="three" data-depth="0.40">
                    <div class="content">
                        <span class="piece"></span>
                        <span class="piece"></span>
                        <span class="piece"></span>
                    </div>
                </div>
                <p class="p404" data-depth="0.50">Marko Prihoško</p>
                <p class="p404" data-depth="0.10">Marko Prihoško</p>
            </div>

            <div class="text">
                <article>
                    <p>Welcome! I'm Marko Prihoško. <br>Beginner WebDev.</p>
                    <button id="hover"><a href="https://github.com/MarePri">GitHub</a></button>
                </article>
            </div>

        </div>
    </section>

    <!-- Racing track container -->
    <div class="race-track" id="raceTrack">
        <div class="track-line top"></div>
        <div class="track-line bottom"></div>

        <!-- F1 Cars -->
        <div class="racer f1-car car-1" id="car1">
            <svg viewBox="0 0 80 28" xmlns="http://www.w3.org/2000/svg">
                <!-- Wheels -->
                <circle cx="14" cy="22" r="5" fill="#111"/>
                <circle cx="14" cy="22" r="2.5" fill="#888"/>
                <circle cx="64" cy="22" r="5" fill="#111"/>
                <circle cx="64" cy="22" r="2.5" fill="#888"/>
                <circle cx="22" cy="22" r="4" fill="#111"/>
                <circle cx="22" cy="22" r="2" fill="#888"/>
                <circle cx="56" cy="22" r="4" fill="#111"/>
                <circle cx="56" cy="22" r="2" fill="#888"/>
                <!-- Body -->
                <path d="M10 18 L16 8 L30 6 L50 6 L66 10 L72 18 Z" fill="#E8002D"/>
                <!-- Cockpit -->
                <path d="M30 6 L34 2 L46 2 L50 6 Z" fill="#1a1a2e"/>
                <path d="M34 2 L46 2 L44 4 L36 4 Z" fill="#88ccff" opacity="0.8"/>
                <!-- Front wing -->
                <path d="M66 16 L76 16 L78 18 L64 18 Z" fill="#E8002D"/>
                <!-- Rear wing -->
                <path d="M10 12 L4 10 L2 12 L10 14 Z" fill="#E8002D"/>
                <rect x="4" y="9" width="6" height="2" fill="#E8002D"/>
                <!-- Halo -->
                <path d="M35 5 Q40 3 45 5" stroke="#gold" stroke-width="1.5" fill="none" stroke="#FFD700"/>
                <!-- Number -->
                <text x="38" y="15" font-size="6" fill="white" font-weight="bold" text-anchor="middle">1</text>
            </svg>
            <div class="exhaust"></div>
        </div>

        <div class="racer f1-car car-2" id="car2">
            <svg viewBox="0 0 80 28" xmlns="http://www.w3.org/2000/svg">
                <circle cx="14" cy="22" r="5" fill="#111"/>
                <circle cx="14" cy="22" r="2.5" fill="#888"/>
                <circle cx="64" cy="22" r="5" fill="#111"/>
                <circle cx="64" cy="22" r="2.5" fill="#888"/>
                <circle cx="22" cy="22" r="4" fill="#111"/>
                <circle cx="22" cy="22" r="2" fill="#888"/>
                <circle cx="56" cy="22" r="4" fill="#111"/>
                <circle cx="56" cy="22" r="2" fill="#888"/>
                <path d="M10 18 L16 8 L30 6 L50 6 L66 10 L72 18 Z" fill="#00D2FF"/>
                <path d="M30 6 L34 2 L46 2 L50 6 Z" fill="#0a0a1a"/>
                <path d="M34 2 L46 2 L44 4 L36 4 Z" fill="#88ccff" opacity="0.8"/>
                <path d="M66 16 L76 16 L78 18 L64 18 Z" fill="#00D2FF"/>
                <path d="M10 12 L4 10 L2 12 L10 14 Z" fill="#00D2FF"/>
                <rect x="4" y="9" width="6" height="2" fill="#00D2FF"/>
                <path d="M35 5 Q40 3 45 5" stroke="#FFD700" stroke-width="1.5" fill="none"/>
                <text x="38" y="15" font-size="6" fill="white" font-weight="bold" text-anchor="middle">4</text>
            </svg>
            <div class="exhaust"></div>
        </div>

        <!-- MotoGP Bikes -->
        <div class="racer motogp-bike bike-1" id="bike1">
            <svg viewBox="0 0 60 36" xmlns="http://www.w3.org/2000/svg">
                <!-- Wheels -->
                <circle cx="10" cy="26" r="8" fill="#111" stroke="#555" stroke-width="1.5"/>
                <circle cx="10" cy="26" r="4" fill="#333"/>
                <circle cx="10" cy="26" r="1.5" fill="#aaa"/>
                <circle cx="50" cy="26" r="8" fill="#111" stroke="#555" stroke-width="1.5"/>
                <circle cx="50" cy="26" r="4" fill="#333"/>
                <circle cx="50" cy="26" r="1.5" fill="#aaa"/>
                <!-- Frame -->
                <line x1="10" y1="26" x2="30" y2="14" stroke="#FFD700" stroke-width="2"/>
                <line x1="50" y1="26" x2="30" y2="14" stroke="#FFD700" stroke-width="2"/>
                <line x1="10" y1="26" x2="50" y2="26" stroke="#888" stroke-width="1" opacity="0.4"/>
                <!-- Body/Fairing -->
                <path d="M18 22 Q30 8 44 18 L40 26 L20 26 Z" fill="#FF6B00"/>
                <path d="M36 12 Q42 10 46 16 L42 20 Q38 14 36 12 Z" fill="#cc5500"/>
                <!-- Rider -->
                <ellipse cx="30" cy="14" rx="7" ry="5" fill="#222"/>
                <circle cx="34" cy="10" r="4" fill="#333"/>
                <path d="M30 10 L36 8 L38 10 L34 12 Z" fill="#FF6B00"/>
                <!-- Handlebar -->
                <line x1="42" y1="16" x2="48" y2="14" stroke="#aaa" stroke-width="1.5"/>
                <!-- Number plate -->
                <rect x="26" y="16" width="10" height="6" rx="1" fill="white" opacity="0.9"/>
                <text x="31" y="21" font-size="5" fill="#333" font-weight="bold" text-anchor="middle">46</text>
            </svg>
            <div class="exhaust bike-exhaust"></div>
        </div>

        <div class="racer motogp-bike bike-2" id="bike2">
            <svg viewBox="0 0 60 36" xmlns="http://www.w3.org/2000/svg">
                <circle cx="10" cy="26" r="8" fill="#111" stroke="#555" stroke-width="1.5"/>
                <circle cx="10" cy="26" r="4" fill="#333"/>
                <circle cx="10" cy="26" r="1.5" fill="#aaa"/>
                <circle cx="50" cy="26" r="8" fill="#111" stroke="#555" stroke-width="1.5"/>
                <circle cx="50" cy="26" r="4" fill="#333"/>
                <circle cx="50" cy="26" r="1.5" fill="#aaa"/>
                <line x1="10" y1="26" x2="30" y2="14" stroke="#ccc" stroke-width="2"/>
                <line x1="50" y1="26" x2="30" y2="14" stroke="#ccc" stroke-width="2"/>
                <path d="M18 22 Q30 8 44 18 L40 26 L20 26 Z" fill="#C70000"/>
                <path d="M36 12 Q42 10 46 16 L42 20 Q38 14 36 12 Z" fill="#900"/>
                <ellipse cx="30" cy="14" rx="7" ry="5" fill="#222"/>
                <circle cx="34" cy="10" r="4" fill="#333"/>
                <path d="M30 10 L36 8 L38 10 L34 12 Z" fill="#C70000"/>
                <line x1="42" y1="16" x2="48" y2="14" stroke="#aaa" stroke-width="1.5"/>
                <rect x="26" y="16" width="10" height="6" rx="1" fill="white" opacity="0.9"/>
                <text x="31" y="21" font-size="5" fill="#333" font-weight="bold" text-anchor="middle">93</text>
            </svg>
            <div class="exhaust bike-exhaust"></div>
        </div>
    </div>

    <script src='https://cdnjs.cloudflare.com/ajax/libs/parallax/3.1.0/parallax.min.js'></script>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js'></script>
    <script src="./script.js"></script>
    <script src="./racing.js"></script>

</body>

</html>
